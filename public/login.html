<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In | Reinmax Creative</title>
    <meta name="description" content="Access your Reinmax Creative account.">
    <link rel="icon" href="https://res.cloudinary.com/reinmaxcreative/image/upload/v1755166745/icon.ico" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.cdnfonts.com/css/sora-3" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/space-grotesk" rel="stylesheet">
    <link rel="stylesheet" href="login-style.css">
</head>
<body class="antialiased">

    <div class="min-h-screen flex flex-col items-center justify-center bg-gray-50 p-4">
        
        <div class="w-full max-w-md">
            <!-- Logo and Header -->
            <div class="text-center mb-8">
                <div class="flex items-center justify-center mx-auto h-10 w-10">
                    <svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000">
                      <defs>
                        <style>
                          .cls-1 {
                            fill: var(--primary-color);
                          }
                        </style>
                      </defs>
                      <path class="cls-1" d="M0,0v1000h1000V0H0ZM875,500h-375l375,375H125V125h750.01v375Z"/>
                    </svg>
                </div>
                <h2 class="mt-6 text-3xl font-bold text-gray-900">Sign in to your account</h2>
                <p class="mt-2 text-sm text-gray-600">
                    Not a member? <a href="signup.html" class="font-medium text-primary hover:text-secondary">Sign up</a>
                </p>
            </div>

            <!-- Form Container -->
            <div class="bg-white p-8 shadow-xl rounded-2xl">
                <form id="login-form" class="space-y-6" novalidate>
                    <div id="notification" class="hidden text-center p-3 rounded-md text-sm"></div>
                    
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700">Email address</label>
                        <div class="mt-1">
                            <input id="email" name="email" type="email" autocomplete="email" required class="form-input">
                        </div>
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                        <div class="mt-1 password-container">
                            <input id="password" name="password" type="password" autocomplete="current-password" required class="form-input">
                            <button type="button" class="password-toggle" id="password-toggle"></button>
                        </div>
                    </div>

                    <div class="flex items-center justify-between">
                        <!-- **MODIFIED HERE**: Reverted to a standard checkbox structure -->
                        <div class="flex items-center">
                            <input id="remember-me" name="remember-me" type="checkbox" class="text-primary border-gray-300 rounded focus:ring-primary">
                            <label for="remember-me" class="ml-3 block text-sm text-gray-900">Remember me</label>
                        </div>

                        <div class="text-sm">
                            <a href="#" id="forgot-password-link" class="font-medium text-primary hover:text-secondary">Forgot your password?</a>
                        </div>
                    </div>

                    <div>
                        <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-opacity">
                            Sign in
                        </button>
                    </div>
                </form>
            </div>
        </div>

    </div>

    <!-- Modal -->
    <div id="forgot-password-modal" class="modal-overlay">
        <div class="modal-container">
            <button id="close-modal-button" class="absolute top-4 right-4 text-3xl leading-none">&times;</button>
            <div class="text-center mb-6">
                <h3 class="text-2xl font-bold text-primary">Reset Password</h3>
                <p class="text-gray-600 mt-2">Enter your email to receive a reset link.</p>
            </div>
            <form id="forgot-password-form">
                <div>
                    <label for="reset-email" class="block text-gray-700 font-bold mb-2">Email Address</label>
                    <input type="email" id="reset-email" name="reset-email" class="form-input" placeholder="you@example.com" required>
                </div>
                <div class="text-center mt-6">
                    <button type="submit" class="w-full bg-primary text-white font-bold py-3 px-6 rounded-lg hover:bg-secondary hover:text-primary transition-colors duration-300">Send Reset Link</button>
                </div>
            </form>
        </div>
    </div>

    <script src="login-script.js" defer></script>
</body>
</html>
